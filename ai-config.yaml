version: 1

Modeltypes:
  types: ["Reasoning", "Decision", "Text Generation"]

Models:
  - name: "mistral-reasoning"
    description: "A large language model for deep reasoning, analysis, and multi-step thinking."
    type: "Reasoning"
    role: "reasoning"
    parameters:
      - name: "temperature"
        description: "Controls the randomness of the output. Higher = more creative."
        type: "float"
        default: 0.7
      - name: "max_tokens"
        description: "The maximum number of tokens to generate."
        type: "integer"
        default: 512
      - name: "n_gpu_layers"
        description: "Number of model layers to offload to GPU. Set to 99 to offload all layers (requires CUDA/Metal build). Set to 0 for CPU-only."
        type: "integer"
        default: 0
      - name: "n_threads"
        description: "Number of CPU threads for token generation. Set to your physical core count (not logical/HT). 0 = auto-detect."
        type: "integer"
        default: 4
      - name: "n_ctx"
        description: "Context window size in tokens. Use 2048+ for long reasoning chains."
        type: "integer"
        default: 2048
      - name: "n_batch"
        description: "Batch size for prompt evaluation. Larger = faster prompt processing. 512 is recommended."
        type: "integer"
        default: 512
    modelPath: "E:\\model-guff\\mistral-7b-v0.1.Q4_K_M.gguf"

  - name: "mistral-decision"
    description: "A model optimised for concise, deterministic decision-making and action selection."
    type: "Decision"
    role: "decision"
    parameters:
      - name: "temperature"
        description: "Lower temperature for more deterministic, decisive outputs."
        type: "float"
        default: 0.3
      - name: "max_tokens"
        description: "The maximum number of tokens to generate. Decisions are short."
        type: "integer"
        default: 256
      - name: "n_gpu_layers"
        description: "Number of model layers to offload to GPU. Set to 99 to offload all layers (requires CUDA/Metal build). Set to 0 for CPU-only."
        type: "integer"
        default: 0
      - name: "n_threads"
        description: "Number of CPU threads for token generation. 0 = auto-detect."
        type: "integer"
        default: 4
      - name: "n_ctx"
        description: "Context window size in tokens. Smaller for faster decisions."
        type: "integer"
        default: 512
      - name: "n_batch"
        description: "Batch size for prompt evaluation."
        type: "integer"
        default: 512
    modelPath: "E:\\model-guff\\mistral-7b-v0.1.Q4_K_M.gguf"