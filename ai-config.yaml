version: 1

# CLI system prompt configuration. If absent, defaults are used.
system_prompt: "You are a friendly AI assistant named lala. Explain things clearly and naturally. Respond in full sentences."
reasoning_system_prompt: "You are an internal reasoning engine. Analyse the user's query carefully. Think step by step: what is the user asking, what context matters, and what would make the best answer. Output your analysis concisely — this will be used to guide the final response, not shown to the user."
decision_system_prompt: "You are lala, a friendly and concise AI assistant. You have been given an internal analysis to guide you. Use it to inform your answer but do NOT repeat or quote it. Respond directly to the user in clear, natural language."

Modeltypes:
  types: ["Reasoning", "Decision", "Text Generation"]

Models:
  - name: "mistral-reasoning"
    description: "A large language model for deep reasoning, analysis, and multi-step thinking."
    type: "Reasoning"
    role: "reasoning"
    parameters:
      - name: "temperature"
        description: "Controls the randomness of the output. Higher = more creative."
        type: "float"
        default: 0.7
      - name: "max_tokens"
        description: "The maximum number of tokens to generate."
        type: "integer"
        default: 2048
      - name: "n_gpu_layers"
        description: "Number of model layers to offload to GPU. Set to 99 to offload all layers (requires CUDA/Metal build). Set to 0 for CPU-only."
        type: "integer"
        default: 0
      - name: "n_threads"
        description: "CPU threads for token generation (autoregressive decode). Set to physical core count. 0 = auto-detect."
        type: "integer"
        default: 0
      - name: "n_threads_batch"
        description: "CPU threads for prompt evaluation (prefill). Can be higher than n_threads. 0 = use all available cores."
        type: "integer"
        default: 0
      - name: "n_ctx"
        description: "Context window size in tokens. Use 2048+ for long reasoning chains."
        type: "integer"
        default: 4096
      - name: "n_batch"
        description: "Batch size for prompt evaluation. Larger = faster prompt processing."
        type: "integer"
        default: 512
      - name: "use_mlock"
        description: "Pin model weights in RAM (prevents OS from swapping them out during inference). 1 = enabled."
        type: "integer"
        default: 1
      - name: "embedding"
        description: "Whether to generate embeddings instead of text. 1 = enabled."
        type: "integer"
        default: 0
    modelPath: "D:\\models\\deepseek-coder-1.3b-instruct.Q4_K_M.gguf"

  - name: "mistral-decision"
    description: "A model optimised for concise, deterministic decision-making and action selection."
    type: "Decision"
    role: "decision"
    parameters:
      - name: "temperature"
        description: "Lower temperature for more deterministic, decisive outputs."
        type: "float"
        default: 0.3
      - name: "max_tokens"
        description: "The maximum number of tokens to generate. Decisions are short."
        type: "integer"
        default: 2048
      - name: "n_gpu_layers"
        description: "Number of model layers to offload to GPU. 0 = CPU-only."
        type: "integer"
        default: 0
      - name: "n_threads"
        description: "CPU threads for token generation. 0 = auto-detect."
        type: "integer"
        default: 0
      - name: "n_threads_batch"
        description: "CPU threads for prompt evaluation. 0 = use all available cores."
        type: "integer"
        default: 0
      - name: "n_ctx"
        description: "Context window size in tokens. Kept smaller for faster KV cache allocation."
        type: "integer"
        default: 8000
      - name: "n_batch"
        description: "Batch size for prompt evaluation."
        type: "integer"
        default: 512
      - name: "use_mlock"
        description: "Pin model weights in RAM. 1 = enabled."
        type: "integer"
        default: 1
      - name: "embedding"
        description: "Whether to generate embeddings instead of text. 1 = enabled."
        type: "integer"
        default: 0
    modelPath: "D:\\models\\qwen2.5-3b-instruct-q4_k_m.gguf"

  - name: "embedding"
    description: "A model for generating vector embeddings from text, used for semantic search and retrieval."
    type: "Embedding"
    role: "embedding"
    parameters:
      - name: "temperature"
        description: "Higher temperature for more creative, diverse outputs."
        type: "float"
        default: 0.9
      - name: "max_tokens"
        description: "The maximum number of tokens to generate."
        type: "integer"
        default: 512
      - name: "n_gpu_layers"
        description: "Number of model layers to offload to GPU. 0 = CPU-only."
        type: "integer"
        default: 0
      - name: "n_threads"
        description: "CPU threads for token generation. 0 = auto-detect."
        type: "integer"
        default: 0
      - name: "n_threads_batch"
        description: "CPU threads for prompt evaluation. 0 = use all available cores."
        type: "integer"
        default: 0
      - name: "n_ctx"
        description: "Context window size in tokens."
        type: "integer"
        default: 1024
      - name: "n_batch"
        description: "Batch size for prompt evaluation."
        type: "integer"
        default: 512
      - name: "use_mlock"
        description: "Pin model weights in RAM. 1 = enabled."
        type: "integer"
        default: 1
      - name: "embedding"
        description: "Whether to generate embeddings instead of text. 1 = enabled."
        type: "integer"
        default: 1
    modelPath: "D:\\models\\bge-small-en-v1.5-q4_k_m.gguf"